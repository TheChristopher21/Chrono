spring.profiles.default=local

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

app.production=${APP_PRODUCTION:false}
app.initialize.admin=${APP_INITIALIZE_ADMIN:false}
app.admin.username=${APP_ADMIN_USERNAME:admin}
app.admin.password=${APP_ADMIN_PASSWORD:}
app.demo-login.enabled=${APP_DEMO_LOGIN_ENABLED:false}
app.demo-login.allow-production=${APP_DEMO_LOGIN_ALLOW_PRODUCTION:false}
app.demo-login.session-ttl=${APP_DEMO_LOGIN_SESSION_TTL:PT24H}
app.demo-login.rate-limit.max-requests-per-ip=${APP_DEMO_LOGIN_RATE_LIMIT_MAX_REQUESTS_PER_IP:5}
app.demo-login.rate-limit.global-max-requests=${APP_DEMO_LOGIN_RATE_LIMIT_GLOBAL_MAX_REQUESTS:100}
app.demo-login.rate-limit.window-seconds=${APP_DEMO_LOGIN_RATE_LIMIT_WINDOW_SECONDS:3600}
app.demo-login.cleanup-interval-ms=${APP_DEMO_LOGIN_CLEANUP_INTERVAL_MS:3600000}
app.demo-login.cleanup-initial-delay-ms=${APP_DEMO_LOGIN_CLEANUP_INITIAL_DELAY_MS:300000}
app.balance-rebuild-on-startup=${APP_BALANCE_REBUILD_ON_STARTUP:false}

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
nfc.agent.token=${NFC_AGENT_TOKEN}
nfc.agent.allow-localhost-legacy=${NFC_AGENT_ALLOW_LOCALHOST_LEGACY:false}
report.ics-feed.token=${REPORT_ICS_FEED_TOKEN:}
report.ics-feed.public-without-token=${REPORT_ICS_FEED_PUBLIC_WITHOUT_TOKEN:false}

spring.jpa.open-in-view=true
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jackson.time-zone=Europe/Zurich

logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:INFO}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF

spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}

spring.security.user.name=${SPRING_SECURITY_USER_NAME:}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD:}

# Stripe is optional. Leave unset unless payments are enabled.
stripe.secret-key=${STRIPE_SECRET_KEY:}

# Allow larger multipart uploads (e.g., company logo files)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Local LLM endpoint
llm.base-url=${LLM_BASE_URL:http://localhost:5000}
chat.rate-limit.max-requests=${CHAT_RATE_LIMIT_MAX_REQUESTS:20}
chat.rate-limit.window-seconds=${CHAT_RATE_LIMIT_WINDOW_SECONDS:300}

# Banking integrations
banking.integrations.payments.enabled=${BANKING_PAYMENTS_ENABLED:false}
banking.integrations.payments.mode=${BANKING_PAYMENTS_MODE:SIMULATED}
banking.integrations.payments.endpoint=${BANKING_PAYMENTS_ENDPOINT:}
banking.integrations.payments.api-key=${BANKING_PAYMENTS_API_KEY:}
banking.integrations.payments.content-type=${BANKING_PAYMENTS_CONTENT_TYPE:application/xml}
banking.integrations.payments.export-directory=${BANKING_PAYMENTS_EXPORT_DIRECTORY:}
banking.integrations.payments.export-channel=${BANKING_PAYMENTS_EXPORT_CHANNEL:EBICS}
banking.integrations.payments.export-metadata=${BANKING_PAYMENTS_EXPORT_METADATA:true}
banking.integrations.signatures.enabled=${BANKING_SIGNATURES_ENABLED:false}
banking.integrations.signatures.base-url=${BANKING_SIGNATURES_BASE_URL:}
banking.integrations.signatures.api-key=${BANKING_SIGNATURES_API_KEY:}
banking.integrations.signatures.poll-interval=${BANKING_SIGNATURES_POLL_INTERVAL:PT5M}
banking.integrations.messages.enabled=${BANKING_MESSAGES_ENABLED:false}
banking.integrations.messages.endpoint=${BANKING_MESSAGES_ENDPOINT:}
banking.integrations.messages.api-key=${BANKING_MESSAGES_API_KEY:}

# Monitoring endpoints
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true

# Comma-separated IPs that should not be counted by Chrono Analytics.
app.analytics.excluded-ips=${APP_ANALYTICS_EXCLUDED_IPS:146.185.87.126}

# Fail fast only when legacy Supply Chain rows without company_id should block startup explicitly.
app.supply-chain.fail-on-missing-company-assignment=${APP_SUPPLY_CHAIN_FAIL_ON_MISSING_COMPANY_ASSIGNMENT:false}
